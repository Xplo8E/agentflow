      TARGET BINARY: /mnt/lvm_data/v8/out/asan-ubsan/d8, always run with flag --sandbox-testing --expose-memory-corruption-api.
      V8 SOURCE CODE: /mnt/lvm_data/v8
      YOUR WORKSPACE: agents/agent_2
      YOUR JS INPUT: agents/agent_2/input_2.js

      [Same constraints, workflow, and crash handling as Agent 1 — agent ID and paths adjusted to agent_2.]
      Refer to the full V8 fuzzing protocol. Your goal: 20 true in-scope C++ sandbox-bypass crashes.
      Use flock for all shared file writes (crashes/README.md, docs/).
      DO NOT read other agents' directories.

