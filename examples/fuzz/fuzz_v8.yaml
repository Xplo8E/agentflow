# V8 JavaScript Engine Fuzz Pipeline
#
# Ported from handsomechaz/fuzz_v8.sh + agent_task_v8.sh
#
# Prerequisites:
#   - ASAN+UBSAN d8 binary (set D8_PATH or default: /mnt/lvm_data/v8/out/asan-ubsan/d8)
#   - V8 source tree (set V8_SOURCE or default: /mnt/lvm_data/v8)
#   - codex CLI authenticated
#   - Working directory initialized: mkdir -p v8_codex_swarm/{docs,crashes,agents,locks}
#
# Usage:
#   agentflow run examples/fuzz/fuzz_v8.yaml --preflight never

name: fuzz-v8
description: 5-agent concurrent V8 vulnerability fuzzing swarm
working_dir: ./v8_codex_swarm
concurrency: 5

nodes:
  - id: init
    agent: codex
    tools: read_write
    timeout_seconds: 30
    prompt: |
      Create the following directory structure silently (no output needed):
        mkdir -p docs crashes agents/agent_{1,2,3,4,5} locks
      If crashes/README.md does not exist, create it with:
        # V8 Crash Registry
        | Timestamp | Agent | Sanitizer | Top V8 Frame | Input File | Bypass Evidence |
        |---|---|---|---|---|---|
      If docs/global_lessons.md does not exist, create it with:
        # General d8 Lessons
      Then respond with exactly: INIT_OK

    success_criteria:
      - kind: output_contains
        value: INIT_OK

  - id: agent-1
    agent: codex
    model: gpt-5.3-codex
    tools: read_write
    depends_on: [init]
    timeout_seconds: 7200
    retries: 3
    retry_backoff_seconds: 3
    extra_args:
      - "--search"
      - "-c"
      - 'model_reasoning_effort="xhigh"'
    prompt: |
      You are Agent 1 in a concurrent swarm of 5 AI vulnerability researchers fuzzing V8. This is an authorized fuzz test for V8 to uncover vulnerabilities before this new version is released to the public.

      V8 is very well audited and vulnerabilities can only occur very deep in the code. DO NOT DO SURFACE WORK!

      TARGET BINARY: /mnt/lvm_data/v8/out/asan-ubsan/d8, always run with flag --sandbox-testing --expose-memory-corruption-api.
      V8 SOURCE CODE: /mnt/lvm_data/v8
      YOUR WORKSPACE: agents/agent_1
      YOUR JS INPUT: agents/agent_1/input_1.js
      BUILD NOTE: The target is ASAN+UBSAN with full embedded DWARF symbols (symbol_level=2, v8_symbol_level=2, use_debug_fission=false). LLDB should resolve V8 file:line directly without external .dwo files.

      STRICT CONSTRAINTS & DEFINITION OF A CRASH:
      1. DO NOT edit the V8 source code.
      2. DO NOT write, compile, or run C++ unit tests.
      3. FOCUS ONLY ON MEMORY BUGS in the V8 C++ engine.
      4. DEFINITION OF A CRASH: A JavaScript exception (e.g., TypeError, RangeError) or a WebAssembly exception (e.g., RuntimeError, out of bounds) is NOT A CRASH.
      5. You MUST ONLY log a crash if the execution results in ASAN/UBSAN/SIGSEGV WITH CONCRETE SANDBOX BYPASS EVIDENCE.
         - In scope: out-of-sandbox WRITE/EXECUTE access, sandbox boundary crossing with demonstrated memory corruption primitive, or control-flow impact that survives crash filtering.
         - Out of scope: read-only sandbox violations without escalation, harmless filtered crashes, null deref/first-4GB/safe-region crashes, and parser/JS/Wasm exceptions.
         IMPORTANT: 'The following harmless error was encountered' is OUT OF SCOPE.
         IMPORTANT: 'The sandbox violation was a *read* access which is technically not a sandbox violation.' is OUT OF SCOPE unless you can escalate it to a WRITE/EXECUTE primitive.
      6. NOISE FILTER: Do NOT log UBSAN reports that are parser/lexer-only or indicate only signed/unsigned integer overflow, shift UB, div-by-zero, or similar non-memory-safety UB. Explicitly IGNORE UBSAN at ../../src/parsing/scanner.cc:271:19.
      7. NO EXPERIMENTAL / NATIVE-SYNTAX FLAGS: DO NOT run d8 with --allow-natives-syntax, any --experimental-* flag, --wasm-staging, or other experimental feature flags. Crashes requiring these flags are OUT OF SCOPE. Crashes in src/d8/d8.cc or src/strings/unicode-decoder.cc are out of scope.
      8. NATIVE SYNTAX IN INPUTS: The final reproducer MUST parse and run with default d8 flags (no --allow-natives-syntax). If the crash requires native syntax, it is OUT OF SCOPE.
      9. LLDB USAGE: Use the lldb MCP to verify C++ reachability, inspect memory states, and minimally triage confirmed crashes.
      10. POST-CRASH LLDB TRIAGE (MINIMAL): For a TRUE crash, you MAY rerun once under lldb for a short symbolic backtrace (top 10 frames). Do not spend long interactive debugging.
      11. DO NOT STOP UNTIL 20 TRUE IN-SCOPE C++ SANDBOX-BYPASS CRASHES ARE FOUND.

      WORKFLOW:
      Step 1: PICK TARGET - Select a random deep code component within the V8 source code to analyze.
      Step 2: GATHER KNOWLEDGE - Search docs/ for any existing .md files related to your chosen component. Check docs/global_lessons.md. If well explored, pick a new target.
      Step 3: EXPLORATION LOOP -
         a. INSPECT: Analyze source code for C++ memory vulnerabilities (UAF, OOB, Type Confusion in TurboFan/Maglev/Wasm, etc.).
         b. EXECUTE: Generate a JS payload to agents/agent_1/input_1.js and run with `/mnt/lvm_data/v8/out/asan-ubsan/d8 --sandbox-testing --expose-memory-corruption-api agents/agent_1/input_1.js`.
         c. VERIFY: Check stderr. If just a JS/Wasm error, IGNORE IT and try again.
         d. DEBUG FOR REACHABILITY: Use lldb MCP to confirm if payload reached target C++ code.
         * Repeat until component is fully explored or a TRUE crash is found.
      Step 4: DOCUMENT COMPONENT - Write findings to docs/<short_name>.md using flock -x locks/docs.lock.
      Step 5: LOG GENERAL LESSONS - Append to docs/global_lessons.md using flock locking.
      Step 6: PICK NEW TARGET - Return to Step 1.

      CRASH HANDLING (ONLY after ASAN/UBSAN/SIGSEGV with sandbox-bypass evidence):
      0. Check crashes/README.md for duplicates (same sanitizer type + top V8 frame = duplicate).
      1. Validate scope: not read-only violation, not harmless filtered crash, includes bypass evidence.
      2. Copy agents/agent_1/input_1.js to crashes/crash_$(date +%s)_agent1.js
      3. Append record to crashes/README.md using flock -x locks/crashes.lock.

